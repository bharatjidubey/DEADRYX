<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0f16" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Exercise Notes & Form Cues | DEADRYX - Workout Tracker</title>
  <meta name="description" content="Keep detailed exercise notes, form cues, and seat positioning tips for every exercise. Auto-saved instantly on DEADRYX's offline workout tracker." />
  <meta name="keywords" content="exercise notes, workout form cues, gym form tips, exercise instructions, workout journal, DEADRYX notes" />
  <meta name="author" content="Bharat Ji Dubey" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://deadryx.netlify.app/notes.html" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://deadryx.netlify.app/notes.html" />
  <meta property="og:title" content="Exercise Notes & Form Cues | DEADRYX" />
  <meta property="og:description" content="Keep detailed exercise notes and form cues for every exercise on DEADRYX." />
  <meta property="og:image" content="https://deadryx.netlify.app/logo.png" />
  <meta property="og:site_name" content="DEADRYX" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Exercise Notes | DEADRYX" />
  <meta name="twitter:description" content="Keep detailed exercise notes and form cues on DEADRYX." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="shared.js" defer></script>
  <style>
    .save-indicator { font-size: 0.85rem; color: var(--muted); margin-left: 1rem; transition: color 0.3s ease; opacity: 0; }
    .save-indicator.visible { opacity: 1; }
    .save-indicator.saving { color: var(--blue); }
    .save-indicator.saved { color: var(--green); }
  </style>
</head>
<body>
  <div class="app-shell analysis-shell">

    <!-- Mobile Header -->
    <header class="mobile-header">
      <div class="brand" style="margin:0;">
        <div class="brand-mark" style="width: 38px; height: 38px; border-radius: 10px;">
          <img src="logo.png" alt="DEADRYX Logo" width="48" height="48" loading="eager">
        </div>
        <div><p class="brand-name" style="font-size: 1.1rem;">DEADRYX</p></div>
      </div>
      <div class="header-actions-group">
        <button class="theme-toggle-btn" aria-label="Toggle theme"></button>
        <button id="mobileMenuBtn" class="hamburger-btn">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <aside class="sidebar analysis-sidebar" id="appSidebar">
      <div class="brand">
        <div class="brand-mark"><img src="logo.png" alt="DEADRYX Logo" width="48" height="48" loading="eager"></div>
        <div style="flex: 1;">
          <p class="brand-name">DEADRYX</p>
          <p class="brand-subtitle">Strength dashboard</p>
        </div>
        <button class="theme-toggle-btn" aria-label="Toggle theme"></button>
      </div>

      <section class="panel quick-panel">
        <p class="panel-kicker">Notes Mode</p>
        <h1>Exercise Form</h1>
        <p class="panel-copy">
          Chronicle your form cues, seat positioning, and personal notes. Every keystroke is instantly auto-saved.
        </p>
        <button class="primary-btn mt-4" onclick="window.location.href='index.html'">
          &larr; Back to Tracker
        </button>
      </section>
    </aside>

    <main class="main-content">
      <section class="panel day-panel">
        <div class="section-head">
          <div>
            <p class="panel-kicker">Instructions</p>
            <h2 id="exerciseTitle">Exercise Notes</h2>
          </div>
          <div class="header-actions" style="display: flex; align-items: center;">
            <span id="saveIndicator" class="save-indicator">Saved</span>
          </div>
        </div>

        <div class="panel notes-container" style="padding: 0; box-shadow: none; background: transparent;">
          <div class="notes-header">
            <h3 style="font-size: 1.1rem; font-weight: 500;">Form & Cues</h3>
            <button id="editNotesBtn" class="primary-btn">Edit Notes</button>
          </div>
          <textarea id="notesArea" class="notes-textarea" disabled placeholder="Write your specific form cues, seat heights, and personal notes here..."></textarea>
        </div>
      </section>
    </main>
  </div>

  <script src="notes.js"></script>
  <script>
    const mb = document.getElementById("mobileMenuBtn");
    const sb = document.getElementById("appSidebar");
    const ov = document.getElementById("sidebarOverlay");
    if (mb && sb && ov) {
      const t = () => { sb.classList.toggle("open"); ov.classList.toggle("active"); };
      mb.addEventListener("click", t);
      ov.addEventListener("click", t);
    }
  </script>
  <!-- Google Drive Sync Integration -->
  <script src="gdrive-sync.js"></script>
  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
