<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memories | DEADRYX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="shared.js"></script>
</head>
<body>
  <div class="app-shell analysis-shell">

    <!-- Mobile Header -->
    <header class="mobile-header">
      <div class="brand" style="margin:0;">
        <div class="brand-mark" style="width: 38px; height: 38px; border-radius: 10px;">
          <img src="logo.png" alt="DEADRYX Logo">
        </div>
        <div>
          <p class="brand-name" style="font-size: 1.1rem;">DEADRYX</p>
        </div>
      </div>
      <div class="header-actions-group">
        <button class="theme-toggle-btn" aria-label="Toggle theme"></button>
        <button id="mobileMenuBtn" class="hamburger-btn">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <aside class="sidebar" id="appSidebar">
      <div class="brand">
        <div class="brand-mark">
          <img src="logo.png" alt="DEADRYX Logo">
        </div>
        <div style="flex: 1;">
          <p class="brand-name">DEADRYX</p>
          <p class="brand-subtitle">Strength dashboard</p>
        </div>
        <button class="theme-toggle-btn" aria-label="Toggle theme"></button>
      </div>

      <nav style="margin-top: 2rem;">
        <a href="index.html" style="color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          Back to Dashboard
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <section class="panel day-panel" style="display: flex; flex-direction: column; min-height: calc(100vh - 3rem);">
        <div class="section-head" style="margin-bottom: 2rem; flex-wrap: wrap;">
          <div>
            <p class="panel-kicker">Gallery</p>
            <h2>Memories Timeline</h2>
          </div>
          <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
            <input type="file" id="mediaUpload" accept="image/png, image/jpeg, video/mp4" style="display: none;" />
            <button class="primary-btn" onclick="document.getElementById('mediaUpload').click()">Upload Media</button>
          </div>
        </div>

        <p class="muted-text" style="margin-top: -1rem; margin-bottom: 2rem;">
          Track your visual progress. Files are stored entirely offline on this device.
        </p>

        <div class="timeline-grid" id="mediaTimeline"></div>

        <div class="notice-block mt-auto" style="margin-top: auto; padding-top: 2rem;">
          <div class="warning-box">
             ⚠️ <strong>Notice:</strong> All uploaded files in this gallery are stored offline and are undeletable for historical persistence.
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="memories.js"></script>
  <script>
    const mb = document.getElementById("mobileMenuBtn");
    const sb = document.getElementById("appSidebar");
    const ov = document.getElementById("sidebarOverlay");
    if (mb && sb && ov) {
      const t = () => { sb.classList.toggle("open"); ov.classList.toggle("active"); };
      mb.addEventListener("click", t);
      ov.addEventListener("click", t);
    }
  </script>
</body>
</html>
